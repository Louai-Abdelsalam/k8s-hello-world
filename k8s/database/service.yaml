apiVersion: v1
kind: Service
metadata:
  name: guestbook-mariadb
  namespace: guestbook
  labels:
    app: mariadb
    project: guestbook
spec:
  type: ClusterIP
  selector:
    app: mariadb
  # Port values hardcoded — no mechanism to reference DB_PORT from the ConfigMap in raw YAML.
  # Typically addressed via Helm templating.
  ports:
    - port: 3306
      targetPort: 3306
