apiVersion: v1
kind: Secret
metadata:
  name: guestbook-secret
  namespace: guestbook
  labels:
    app: guestbook
    project: guestbook
type: Opaque
# Values are intentionally in plain text — this runs locally with no real security risk,
# and plain values allow the manifests to be reproduced exactly from the spec.
# In a real environment, secrets would be managed via a secrets manager or sealed secrets.
stringData:
  MARIADB_ROOT_PASSWORD: rootpass123
  DB_USERNAME: guestbook_user
  DB_PASSWORD: guestbook_pass
